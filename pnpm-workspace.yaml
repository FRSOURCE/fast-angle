packages:
  - 'packages/*'
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  vue-demi: true

peerDependencyRules:
  allowedVersions:
    vite: "^6.0.0"

overrides:
  "@maxim_mazurok/gapi.client.androidpublisher-v3": "0.3.20260613"
  # Build-tooling override. `@bubblewrap/core
  # extract JDK ZIPs via `extract-zip` → `yauzl`.
  # yauzl 2.10.0 extracts only the first entry and then lets the process exit
  # 0 with no error on Node >= 24.16.0 / >= 26.1.0.
  # yauzl >= 3.3.1 fixes the silent extraction failure. Remove once extract-zip ranges to
  # yauzl >= 3.3.1 on its own.
  yauzl: ^3.3.1

patchedDependencies:
  gaxios@4.3.3: patches/gaxios@4.3.3.patch
  gtoken@5.3.2: patches/gtoken@5.3.2.patch
